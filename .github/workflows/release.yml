name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |

          yarn install
          cd packages/config && yarn install

      - name: Build
        run: yarn build

      - name: Version Bump
        run: yarn changeset:version

      - name: Publish to JSR
        run: yarn jsr:publish